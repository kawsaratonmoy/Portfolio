<main class="section">

    <div class="profile">

      <div class="skills-progress">
        <h3 style="text-align:center; margin-bottom:20px; font-size:22px; color:#7cff00;">My Skills</h3>

        <div class="skill-item">
          <div class="skill-name">Digital Marketing <span class="percent">92%</span></div>
          <div class="progress-container">
            <div class="progress-bar" data-percent="92"></div>
          </div>
        </div>

        <div class="skill-item">
          <div class="skill-name">Landing Page Design <span class="percent">88%</span></div>
          <div class="progress-container">
            <div class="progress-bar" data-percent="88"></div>
          </div>
        </div>

        <div class="skill-item">
          <div class="skill-name">SEO & Analytics <span class="percent">85%</span></div>
          <div class="progress-container">
            <div class="progress-bar" data-percent="85"></div>
          </div>
        </div>

        <div class="skill-item">
          <div class="skill-name">Google Ads <span class="percent">90%</span></div>
          <div class="progress-container">
            <div class="progress-bar" data-percent="90"></div>
          </div>
        </div>

        <div class="skill-item">
          <div class="skill-name">UI Basics / Vibe Coding <span class="percent">78%</span></div>
          <div class="progress-container">

        </a>

      <!-- Add more blog preview cards here -->
    </div>
  </div>
</main>

<script>
// Progress bar animation
document.addEventListener('DOMContentLoaded', () => {
  const bars = document.querySelectorAll('.progress-bar');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        bars.forEach(bar => {
          const percent = bar.dataset.percent;
          bar.style.width = percent + '%';

          const percentEl = bar.closest('.skill-item').querySelector('.percent');
          let count = 0;
          const interval = setInterval(() => {
            count += 2;
            percentEl.textContent = count + '%';
            if (count >= percent) {
              percentEl.textContent = percent + '%';
              clearInterval(interval);
            }
          }, 30);
        });
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  const skills = document.querySelector('.skills-progress');
  if (skills) observer.observe(skills);
});
</script>

</body>
