<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kawsar - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<body style="background:#111; color:#fff; padding:100px 40px;">

<div id="login" style="max-width:500px; margin:auto; background:#f9f9f9; color:#111; padding:50px; border-radius:10px; border:3px solid #7cff00;">
  <h2>Admin Login</h2>
  <form id="adminLogin">
    <input type="email" id="email" placeholder="Email" required style="width:100%; margin:10px 0;">
    <input type="password" id="password" placeholder="Password" required style="width:100%; margin:10px 0;">
    <button type="submit" style="width:100%;">Login</button>
  </form>
  <p id="error" style="color:red; margin-top:10px;"></p>
</div>

<div id="dashboard" style="display:none; max-width:1200px; margin:auto;">
  <h1>Admin Dashboard</h1>
  <button onclick="logout()" style="background:#7cff00; color:#111; padding:12px 24px; margin:20px 0;">Logout</button>

  <h2>Manage Skills (Left Sidebar)</h2>
  <button id="addSkillBtn">Add New Skill</button>

  <div id="skillForm" style="display:none; margin:20px 0; padding:20px; background:#222; border:2px solid #7cff00; border-radius:10px;">
    <input type="text" id="skillName" placeholder="Skill Name" required style="width:100%; margin:10px 0;">
    <input type="number" id="skillPercent" min="0" max="100" placeholder="Percentage (0-100)" required style="width:100%; margin:10px 0;">
    <button id="saveSkill">Save</button>
    <button id="cancelSkill">Cancel</button>
  </div>

  <div id="skillsList" class="cards"></div>

  <!-- More admin sections can be added here: blogs, case studies, etc. -->
</div>
