<div id="login" style="max-width:500px; margin:auto; background:#f9f9f9; color:#111; padding:50px; border-radius:10px; border:3px solid #7cff00;">
  <h2>Admin Login</h2>
  <form id="adminLogin">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p id="error" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none; max-width:1200px; margin:auto;">
  <h1>Admin Dashboard</h1>
  <button onclick="logout()">Logout</button>

  <h2>Manage Blogs</h2>
  <button>Add New Blog</button>
  <!-- Placeholder list - load dynamically with JS/Firestore -->
  <div class="cards">
    <div class="card"><h3>Blog 1</h3><button>Edit</button><button>Delete</button></div>
  </div>

  <h2>Manage Case Studies</h2>
  <button>Add New Case Study</button>
  <div class="cards">
    <div class="card"><h3>Case 1</h3><button>Edit</button><button>Delete</button></div>
  </div>

</div>
